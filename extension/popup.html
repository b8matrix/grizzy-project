<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ActiveLens</title>
  <link rel="stylesheet" href="styles/popup.css">
</head>
<body>
  <div class="container">

    <div class="header">
      <h1>ActiveLens</h1>
      <p class="tagline">Practice tests from any video</p>
    </div>

    <!-- Loading state -->
    <div id="state-loading" class="card center">
      <div class="spinner"></div>
      <p class="muted">Detecting video…</p>
    </div>

    <!-- Error state -->
    <div id="state-error" class="card center hidden">
      <p class="error-icon">⚠️</p>
      <p id="error-msg" class="error-text">Navigate to a YouTube video first.</p>
    </div>

    <!-- Ready state -->
    <div id="state-ready" class="hidden">
      <div class="card">
        <p class="video-title" id="video-title"></p>
      </div>

      <div class="card">
        <h2>Choose Test Mode</h2>

        <label class="mode-option" id="mode-chapters-label">
          <input type="radio" name="mode" value="chapters" id="mode-chapters">
          <div>
            <strong>Chapter-wise Test</strong>
            <p class="mode-desc">Questions based on video chapters</p>
          </div>
        </label>

        <label class="mode-option">
          <input type="radio" name="mode" value="time" id="mode-time" checked>
          <div>
            <strong>10-Minute Interval Test</strong>
            <p class="mode-desc">Questions every 10 minutes of content</p>
          </div>
        </label>

        <p id="no-chapters-msg" class="muted hidden" style="margin-top:8px;font-size:11px;">
          ℹ️ No chapters detected. Using interval mode.
        </p>
      </div>

      <button id="start-btn" class="btn primary">Start Test →</button>
    </div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
